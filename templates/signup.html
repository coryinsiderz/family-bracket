{% extends "base.html" %}
{% block title %}Sign Up - Bracket Pool{% endblock %}

{% block content %}
<div class="container-narrow" style="margin-top: 80px;">
    <div class="card">
        <h1>Sign Up</h1>
        <form method="POST">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" autocomplete="username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required>

            <button type="submit" style="width: 100%; margin-top: 8px;">Create Account</button>
        </form>
        <p class="text-dim text-sm mt-16">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
